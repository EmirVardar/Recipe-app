spring:
  application:
    name: recipe

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/deneme}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
  exp-min: ${JWT_EXP_MIN:60}
